<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRView</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0e1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 32px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      font-size: 12px;
      color: #8b949e;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">PRView</div>
    <div class="tagline">Local PR Review</div>
    <div class="spinner"></div>
    <div id="status">Starting up...</div>
  </div>
</body>
</html>
